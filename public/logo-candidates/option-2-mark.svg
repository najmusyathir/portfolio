  <rect width="32" height="32" rx="3" fill="#16181a"/>
  <path d="M7 6 L7 26 L10 26 L10 11.45 L18 26 L21 26 L21 6 L18 6 L18 20.55 L10 6 Z" fill="#c6923e"/>
  <rect x="24" y="21" width="5" height="5" fill="#c6923e"/>
</svg>
