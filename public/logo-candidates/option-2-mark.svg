<!--
  Option 2 — "Terminal": monospace/technical direction.
  Sharper container (rx 3, vs the shipped rx 7) reads more engineered/less
  soft-app-icon. The N itself is drawn narrower/taller (monospace character
  cell proportions, ~0.7 width:height) rather than the shipped version's
  wide, confident proportions. The small solid brass block at bottom-right
  is a terminal cursor — the same motif carried into option-2-wordmark.svg.
-->
