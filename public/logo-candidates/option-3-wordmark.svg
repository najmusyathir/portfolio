<!--
  Option 3 — "Interlocking": pairs with option-3-mark.svg.
  Same bold grotesque + hand-kerned tracking as the shipped wordmark (N→a
  tightened most), but the trailing accent is a brass rule under the whole
  word instead of a dot/square — a baseline, not a full stop. Ties to the
  monogram's own linework/interlocking construction (both are about strokes
  relating to each other, not a single terminal punctuation mark).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 44" role="img" aria-label="Najmu Syathir — interlocking direction">
  <text x="4" y="29" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#e8ecee">N<tspan dx="-2">a</tspan><tspan dx="-0.5">j</tspan><tspan dx="-0.8">m</tspan><tspan dx="-0.6">u</tspan></text>
  <rect x="4" y="36" width="84" height="3" rx="1.5" fill="#c6923e"/>
</svg>
